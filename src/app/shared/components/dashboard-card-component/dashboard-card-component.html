<ion-content>
  <app-dashboard-card titulo="Ingresos del mes" [monto]="ingresos" tipo="ingreso" icono="trending-up-outline"></app-dashboard-card>
  <app-dashboard-card titulo="Total gastos del mes" [monto]="gastos" tipo="gasto" icono="trending-down-outline"></app-dashboard-card>
  <app-dashboard-card titulo="Saldo actual" [monto]="balance" tipo="saldo" icono="wallet-outline"></app-dashboard-card>

  <ion-list-header>Gastos por Categoría</ion-list-header>
  <app-progress-bar-category 
    *ngFor="let item of categoriasResumen"
    [categoria]="item.categoria"
    [monto]="item.total"
    [porcentaje]="item.porcentaje"
    [color]="item.color">
  </app-progress-bar-category>
</ion-content>
