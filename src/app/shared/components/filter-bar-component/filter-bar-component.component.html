<ion-toolbar>
  <ion-searchbar 
    placeholder="Buscar transacción" 
    (ionInput)="onBuscarInput($event)">
  </ion-searchbar>

  <ion-row>
    <ion-col size="6">
      <ion-segment [value]="tipoSeleccionado" (ionChange)="onTipoChanged($event)">
        <ion-segment-button value="">Todo</ion-segment-button>
        <ion-segment-button value="gasto">Gasto</ion-segment-button>
        <ion-segment-button value="ingreso">Ingreso</ion-segment-button>
      </ion-segment>
    </ion-col>

    <ion-col size="6">
      <ion-item lines="none">
        <ion-select 
          placeholder="Categoría" 
          [value]="categoriaSeleccionada" 
          (ionChange)="onCategoriaChanged($event)">
          <ion-select-option value="">Todas</ion-select-option>
          <ion-select-option value="Alimentación">Alimentación</ion-select-option>
          <ion-select-option value="Transporte">Transporte</ion-select-option>
          <ion-select-option value="Ocio">Ocio</ion-select-option>
        </ion-select>
      </ion-item>
    </ion-col>
  </ion-row>
</ion-toolbar>
