<ion-item>
  <ion-datetime-button datetime="date-picker"></ion-datetime-button>

  <ion-modal [keepContentsMounted]="true">
    <ng-template>
      <ion-datetime id="date-picker" presentation="date-time" [value]="value" formatOptions={{
          
        (ionChange)="onChange.emit($event.detail.value)">
      </ion-datetime>
    </ng-template>
  </ion-modal>
</ion-item>

@if (error) {
<ion-note color="danger" class="ion-padding-start">{{ error }}</ion-note>
}
