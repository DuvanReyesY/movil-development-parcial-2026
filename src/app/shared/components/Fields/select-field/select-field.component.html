<ion-item>
  <ion-label position="stacked">{{ label }}</ion-label>
  <ion-select 
    [value]="value" 
    [placeholder]="placeholder"
    (ionChange)="onChange.emit($event.detail.value)">
    @for (option of options; track option) {
      <ion-select-option [value]="option">
        {{ option }}
      </ion-select-option>
    }
  </ion-select>
</ion-item>
@if (error) {
  <ion-note color="danger" class="ion-padding-start">{{ error }}</ion-note>
}
